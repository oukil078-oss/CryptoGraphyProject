version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: cryptolab-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_secure_password}
      POSTGRES_DB: ${POSTGRES_DB:-cryptolab_elections}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: cryptolab-api
    restart: always
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres_secure_password}@db:5432/${POSTGRES_DB:-cryptolab_elections}?schema=public
      - JWT_SECRET=${JWT_SECRET:-super_secret_jwt_key_for_cryptolab_elections}
      - PORT=3001
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.example

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: cryptolab-web
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:3001
      - PORT=3000
    depends_on:
      - api
    env_file:
      - .env.example

volumes:
  postgres_data:
